<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SECURITY: Content Security Policy to prevent XSS attacks -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';">
    <title>InkDrift</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- List View -->
        <div id="listView">
            <div class="header">
                <img src="logo.png" alt="InkDrift Logo" class="app-logo">
                <h1>InkDrift</h1>
            </div>

            <div class="section-header in-progress-header">⚡ In Progress</div>
            <ul id="inProgressList" class="todo-list in-progress-section">
                <!-- In-progress items will be added here -->
            </ul>

            <div class="section-header todo-header">📝 To Do</div>
            <ul id="todoList" class="todo-list">
                <!-- To-do items will be added here -->
            </ul>

            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new task..." />
                <button id="addBtn">Add</button>
            </div>

            <div class="view-completed-section">
                <button id="viewCompletedBtn" class="view-completed-btn">View Completed Tasks</button>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" style="display: none;">
            <div class="detail-header">
                <button id="backBtn" class="back-btn">← Back</button>
                <h2 id="detailTitle"></h2>
            </div>

            <div class="detail-content">
                <div class="priority-section">
                    <label for="prioritySelect">Priority:</label>
                    <select id="prioritySelect" class="priority-select">
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="in-progress-section-detail">
                    <label>
                        <input type="checkbox" id="inProgressCheckbox" class="in-progress-checkbox" />
                        Mark as In Progress
                    </label>
                </div>

                <label for="notesInput">Notes:</label>
                <textarea id="notesInput" class="notes-input" placeholder="Add your planning notes here..."></textarea>

                <div class="action-items-section">
                    <label>Action Items:</label>
                    <div id="actionItemsContainer" class="action-items-container">
                        <!-- Action items will be rendered here -->
                    </div>
                    <div class="add-action-item">
                        <input type="text" id="newActionItemInput" class="new-action-item-input" placeholder="Add an action item..." />
                        <button id="addActionItemBtn" class="add-action-item-btn">Add</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Completed View -->
        <div id="completedView" style="display: none;">
            <div class="detail-header">
                <button id="backBtnCompleted" class="back-btn">← Back</button>
                <h2>Completed Tasks</h2>
            </div>

            <ul id="completedList" class="completed-list">
                <!-- Completed items will be added here -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
